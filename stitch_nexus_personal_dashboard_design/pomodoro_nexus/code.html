<style>
        body {
            background-color: #020408;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glow-cyan {
            position: fixed;
            top: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.15) 0%, rgba(34, 211, 238, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

            height: 50vw;

<div class="glow-cyan"></div>
<div class="glow-blue"></div>

<button class="text-white/70 hover:text-cyan-300 transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="text-xl font-black text-cyan-400 tracking-[0.2em] font-inter uppercase">NEXUS</h1>
<div class="w-8 h-8 rounded-full overflow-hidden border border-white/20 ring-2 ring-cyan-400/20 active:scale-95 transition-transform cursor-pointer">

<!-- Main Timer Section -->
<div class="relative w-full max-w-[320px] aspect-square flex items-center justify-center mb-12">
<!-- Progress Ring -->
<svg class="absolute inset-0 w-full h-full -rotate-90" viewbox="0 0 100 100">
<circle class="text-white/5" cx="50" cy="50" fill="none" r="46" stroke="currentColor" stroke-width="2"></circle>
<circle class="drop-shadow-[0_0_8px_rgba(34,211,238,0.4)]" cx="50" cy="50" fill="none" r="46" stroke="url(#cyan-gradient)" stroke-dasharray="289" stroke-dashoffset="70" stroke-linecap="round" stroke-width="3"></circle>
<defs>
<lineargradient id="cyan-gradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" stop-color="#22d3ee"></stop>
<stop offset="100%" stop-color="#0053db"></stop>
</lineargradient>
</defs>
</svg>
<!-- Countdown Timer -->
<div class="text-center z-10">
<p class="font-label-caps text-label-caps text-secondary mb-1 uppercase tracking-widest">Focus Session</p>
<div class="font-h1 text-[64px] leading-tight font-black text-primary timer-glow tracking-tighter">
                    25:00
                </div>
</div>
</div>
<!-- Presets Row -->
<div class="flex flex-wrap justify-center gap-sm mb-12 max-w-sm">
<button class="px-md py-xs rounded-full bg-white/5 border border-white/10 text-white/60 text-label-caps hover:bg-white/10 hover:text-white transition-all active:scale-95">5m</button>
<button class="px-md py-xs rounded-full bg-white/5 border border-white/10 text-white/60 text-label-caps hover:bg-white/10 hover:text-white transition-all active:scale-95">10m</button>

<button class="px-md py-xs rounded-full bg-cyan-500/20 border border-cyan-500/30 text-cyan-400 text-label-caps active:scale-95">25m</button>
<button class="px-md py-xs rounded-full bg-white/5 border border-white/10 text-white/60 text-label-caps hover:bg-white/10 hover:text-white transition-all active:scale-95">50m</button>
</div>

</button>

<span class="material-symbols-outlined text-4xl" data-icon="play_arrow" data-weight="fill" style="font-variation-settings: 'FILL' 1;">play_arrow</span>

<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</div>

<span class="text-cyan-400 font-bold">3/8</span>
</div>
<div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
<div class="h-full w-[37.5%] bg-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.5)]"></div>
</div>

<span>5 hours remaining</span>
</div>
</div>

<span class="material-symbols-outlined" data-icon="settings">settings</span>
