<style>
        /* Custom utilities for mesh gradient blurs and specific text gradients */
        .blur-blob {
            filter: blur(100px);
            border-radius: 50%;
            position: absolute;
            z-index: 0;
            opacity: 0.15;
        }
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Specific focus styles for inputs based on design system rules */
        input:focus {
            box-shadow: none !important;
            border-color: #8aebff !important; /* primary color */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-text-primary min-h-screen flex items-center justify-center p-margin-screen relative overflow-hidden antialiased">
<!-- Ambient Background Mesh Gradient (Simulated) -->
<div class="blur-blob bg-primary w-[400px] h-[400px] top-[-100px] left-[-100px]"></div>
<div class="blur-blob bg-secondary-container w-[500px] h-[500px] bottom-[-200px] right-[-100px] opacity-20"></div>
<div class="blur-blob bg-tertiary w-[300px] h-[300px] top-[20%] right-[10%] opacity-10"></div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-sm flex flex-col gap-xl">
<!-- Header / Branding -->
<header class="text-center flex flex-col items-center gap-sm">
<div class="w-12 h-12 rounded-xl bg-surface-glass border border-glass-border flex items-center justify-center mb-sm shadow-[0_0_20px_rgba(34,211,238,0.15)]">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">
                    target
                </span>
</div>
<h1 class="font-h1 text-h1 text-primary text-gradient bg-gradient-to-r from-primary to-primary-container tracking-tighter">Nexus</h1>
<p class="font-body-md text-body-md text-text-secondary">Initialize your workspace</p>
</header>
<!-- Glassmorphism Card -->
<section class="bg-surface-glass backdrop-blur-xl rounded-xl border border-glass-border p-lg shadow-2xl flex flex-col gap-lg">
<form class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-text-secondary ml-1" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-text-muted text-xl">
                            mail
                        </span>
<input class="w-full bg-transparent border border-glass-border rounded-lg pl-10 pr-4 py-3 font-body-lg text-body-lg text-text-primary placeholder:text-text-muted focus:outline-none transition-colors duration-300" id="email" placeholder="student@university.edu" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-baseline ml-1">
<label class="font-label-caps text-label-caps text-text-secondary" for="password">Password</label>
<a class="font-body-md text-body-md text-primary text-[12px] hover:text-primary-fixed transition-colors" href="#">Forgot?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-text-muted text-xl">
                            lock
                        </span>
<input class="w-full bg-transparent border border-glass-border rounded-lg pl-10 pr-10 py-3 font-body-lg text-body-lg text-text-primary placeholder:text-text-muted focus:outline-none transition-colors duration-300" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 text-text-muted hover:text-text-secondary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-xl">
                                visibility_off
                            </span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="mt-sm w-full bg-gradient-to-r from-primary to-surface-tint text-on-primary-fixed font-label-caps text-label-caps py-3 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200 shadow-[0_0_15px_rgba(34,211,238,0.2)]" type="submit">
                    Access Console
                </button>
</form>
<!-- Divider -->
<div class="relative flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-glass-border"></div>
</div>
<span class="relative bg-background/50 backdrop-blur-md px-3 font-label-caps text-label-caps text-text-muted">OR</span>
</div>
<!-- Secondary Action (Google Sign-in) -->
<button class="w-full bg-surface-glass border border-glass-border text-text-primary font-label-caps text-label-caps py-3 rounded-lg flex items-center justify-center gap-sm hover:bg-white/10 active:scale-[0.98] transition-all duration-200" type="button">
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
</section>
<!-- Footer Link -->
<p class="text-center font-body-md text-body-md text-text-secondary">
            Unregistered entity? 
            <a class="text-primary hover:text-primary-fixed font-semibold transition-colors" href="#">Initialize account</a>
</p>
</main>
</body></html>
